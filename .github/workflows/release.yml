name: 'publish'

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'ubuntu-22.04-arm'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    concurrency:
      group: publish-${{ github.ref }}-${{ matrix.platform }}-${{ matrix.args }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: install dependencies (macos only)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install openssl
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$(brew --prefix openssl@3)/include" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$(brew --prefix openssl@3)/lib" >> $GITHUB_ENV

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: warm pnpm store
        run: pnpm fetch --frozen-lockfile

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: validate updater signing secret
        shell: bash
        run: |
          secret='${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}'
          secret="$(printf '%s' "$secret" | tr -d '\r\n\t ')"

          if [ -z "$secret" ]; then
            echo "::error::Missing repository secret TAURI_SIGNING_PRIVATE_KEY"
            echo "::error::Go to Settings > Secrets and variables > Actions > Repository secrets"
            exit 1
          fi

          if [[ "$secret" != dW50cnVzdGVkIGNvbW1lbnQ6* ]]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY does not look like a Tauri updater private key file content"
            echo "::error::Paste the full content of .local/signing/tauri-updater-private.key into the repository secret"
            echo "::error::Do not paste a local file path or the public key"
            exit 1
          fi

          SECRET_TO_VALIDATE="$secret" python - <<'PY'
          import base64
          import os
          import sys

          secret = os.environ["SECRET_TO_VALIDATE"]
          try:
              decoded = base64.b64decode(secret, validate=True).decode("utf-8", errors="strict")
          except Exception as exc:
              print(f"::error::TAURI_SIGNING_PRIVATE_KEY is not valid base64: {exc}")
              print("::error::Re-copy the exact private key file content, including trailing '=' padding if present")
              sys.exit(1)

          if not decoded.startswith("untrusted comment:"):
              print("::error::Decoded updater key does not start with the expected Tauri key header")
              print("::error::Make sure you pasted the private key, not the public key")
              sys.exit(1)
          PY

          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<EOF"
            echo "$secret"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'EasyAgentPilot ${{ github.ref_name }}'
          releaseBody: |
            ## EasyAgentPilot ${{ github.ref_name }}

            ### Downloads
            - **macOS**: Use the `.dmg` installer. Choose `aarch64` for Apple Silicon and `x64` for Intel.
            - **Windows**: Use the `.msi` or `-setup.exe` installer.
            - **Linux**: Use `.AppImage`, `.deb`, or `.rpm`.

            ### Supported Platforms
            - macOS 10.13+
            - Windows 10+
            - Ubuntu 20.04+, Debian 11+, Fedora 36+, Arch Linux

            In-app auto update becomes visible after this draft release is published and `latest.json` is available.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
